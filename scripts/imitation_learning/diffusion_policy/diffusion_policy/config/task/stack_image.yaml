name: stack_image

shape_meta: &shape_meta
  obs:
    eef_pos:
      shape: [3]
      type: low_dim
    eef_quat:
      shape: [4]
      type: low_dim
    gripper_pos:
      shape: [2]
      type: low_dim
    table_cam:
      shape: [4, 84, 84]
      type: rgb
    wrist_cam:
      shape: [4, 84, 84]
      type: rgb
  action: 
    shape: [7]



task_name: &task_name stack
dataset_type: &dataset_type ph
dataset_path: &dataset_path /workspace/isaaclab/scripts/imitation_learning/datasets/stack/stack_image.zarr
# dataset_path: &dataset_path /workspace/isaaclab/scripts/imitation_learning/datasets/stack/dataset1.hdf5
abs_action: &abs_action False

env_runner:
  _target_: diffusion_policy.env_runner.stack_robomimic_image_runner.StackRobomimicImageRunner
  n_envs: 1
  max_steps: 350
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  device: ${training.device}


dataset:
  _target_: diffusion_policy.dataset.stack_robomimic_replay_image_dataset.RobomimicReplayImageDataset
  shape_meta: *shape_meta
  dataset_path: *dataset_path
  zarr_path: /workspace/isaaclab/scripts/imitation_learning/datasets/stack/stack_image.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  abs_action: False
  rotation_rep: 'rotation_6d'
  use_legacy_normalizer: False
  use_cache: True
  seed: 42
  val_ratio: 0.02