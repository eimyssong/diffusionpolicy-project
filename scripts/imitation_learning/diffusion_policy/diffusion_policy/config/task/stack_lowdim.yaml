name: stack_lowdim

obs_dim: 48
action_dim: 7
keypoint_dim: 2
obs_eef_target: True

env_runner:
  _target_: diffusion_policy.env_runner.stack_lowdim_runner.IsaacLabStackLowdimRunner
  n_envs: 1
  # max_steps: 350
  max_steps: 500
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  device: cuda:0
  abs_action: False 


dataset:
  _target_: diffusion_policy.dataset.stack_lowdim_dataset.StackLowdimDataset
  zarr_path: data/stack/multimodal_push_seed.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  obs_eef_target: ${task.obs_eef_target}
  use_manual_normalizer: False
  seed: 42
  val_ratio: 0.02
